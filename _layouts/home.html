---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">Notes</h1>
  </header>

  <div class="post-content">
      {%- for post in site.notes -%}
      <div class="post">
        <span class="post-title">
            {{ post.author }}
            <h4><a href="{{ post.url }}">{{ post.title }}</a></h4>
        </span>
        {{ post.excerpt }}
      </div>
      {%- endfor -%}
    
    </div>
    {{ content }}
  </div>

</article>
